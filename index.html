/* ── HELPERS ───────────────────────────────────────────────────────────── */
function el(tag,attrs,text){
  const e=document.createElement(tag);
  Object.entries(attrs||{}).forEach(([k,v])=>{
    if(k==="style")e.style.cssText=v;
    else if(k==="onclick")e.addEventListener("click",v);
    else if(k==="className")e.className=v;
    else e.setAttribute(k,v);
  });
  if(text!==undefined)e.textContent=text;
  return e;
}

    .buy-btn:hover{opacity:.88;transform:translateY(-1px)}
  `;
  document.head.appendChild(style);

  const app=el("div",{style:"display:flex;flex-direction:column;height:100vh;background:#080808;"});

  // Header
  const hdr=el("div",{style:"padding:14px 18px;border-bottom:1px solid rgba(212,168,67,.12);display:flex;align-items:center;gap:12px;background:rgba(0,0,0,.7);backdrop-filter:blur(12px);flex-shrink:0;"});
  hdr.innerHTML=`
    <div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#d4a843,#5a3e05);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#000;font-family:monospace;animation:glow 3s ease infinite;flex-shrink:0;">A</div>
    <div><div style="font-weight:700;color:#fff;font-size:14px;">APEX</div><div style="font-size:10px;color:#d4a843;font-family:monospace;letter-spacing:1px;">● LIVE · Gold Trading Strategist</div></div>
    <a href="${BOOK_URL}" target="_blank" style="margin-left:auto;padding:8px 14px;background:rgba(212,168,67,.1);border:1px solid rgba(212,168,67,.3);border-radius:8px;color:#d4a843;text-decoration:none;font-size:12px;font-weight:700;font-family:monospace;letter-spacing:1px;white-space:nowrap;">£4.50 GET IT →</a>`;

  const msgs=el("div",{id:"msgs",style:"flex:1;overflow-y:auto;padding:20px 16px 8px;"});
  const choicesWrap=el("div",{id:"choices",style:"padding:12px 16px 20px;flex-shrink:0;"});
  const footer=el("div",{style:"text-align:center;padding-bottom:14px;font-size:10px;color:rgba(255,255,255,.1);font-family:monospace;letter-spacing:1px;flex-shrink:0;"});
  footer.textContent="POWERED BY INVESTO · XAUUSD INTELLIGENCE";

  app.append(hdr,msgs,choicesWrap,footer);
  document.body.appendChild(app);

  showNode("start",400);
}

function showNode(nodeId,delay){
  const node=TREE[nodeId];
  if(!node)return;
  setTimeout(()=>{
    addBotMsg(node.text,node.showBuy,()=>{
      if(node.choices&&node.choices.length>0)renderChoices(node.choices);
    });
  },delay||400);
}

function addBotMsg(text,showBuy,onDone){
  const msgs=document.getElementById("msgs");
  if(!msgs)return;

  // typing indicator
  const typing=el("div",{style:"display:flex;gap:10px;margin-bottom:16px;animation:slideUp .3s ease-out;"});
  typing.innerHTML=`
    <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#d4a843,#8b6914);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#000;font-family:monospace;flex-shrink:0;">A</div>
    <div style="background:rgba(255,255,255,.05);border:1px solid rgba(212,168,67,.15);border-radius:4px 16px 16px 16px;padding:14px 18px;display:flex;gap:6px;align-items:center;">
      <div style="width:7px;height:7px;border-radius:50%;background:#d4a843;animation:pulse 1.2s ease-in-out 0s infinite;"></div>
      <div style="width:7px;height:7px;border-radius:50%;background:#d4a843;animation:pulse 1.2s ease-in-out .2s infinite;"></div>
      <div style="width:7px;height:7px;border-radius:50%;background:#d4a843;animation:pulse 1.2s ease-in-out .4s infinite;"></div>
    </div>`;
  msgs.appendChild(typing);
  msgs.scrollTop=msgs.scrollHeight;

  setTimeout(()=>{
    typing.remove();
    const wrap=el("div",{style:"display:flex;gap:10px;margin-bottom:16px;animation:slideUp .35s ease-out;"});
    const col=el("div",{style:"max-width:82vw;"});
    col.innerHTML=`
      <div style="font-size:10px;color:#d4a843;letter-spacing:2px;margin-bottom:5px;font-family:monospace;">APEX</div>
      <div style="background:rgba(255,255,255,.05);border:1px solid rgba(212,168,67,.15);border-radius:4px 16px 16px 16px;padding:13px 16px;font-size:14px;line-height:1.7;color:rgba(255,255,255,.88);white-space:pre-wrap;word-break:break-word;">${text}</div>`;
    if(showBuy){
      const btn=el("a",{
        href:BOOK_URL,target:"_blank",className:"buy-btn",
        style:"display:inline-block;margin-top:12px;padding:13px 26px;background:linear-gradient(135deg,#d4a843,#8b6914);color:#000;border-radius:9px;font-weight:800;font-size:13px;text-decoration:none;font-family:monospace;letter-spacing:1px;animation:glow 2s ease infinite;transition:all .15s;"
      },"⚡ GET THE PLAYBOOK — £4.50");
      col.appendChild(btn);
    }
    const av=el("div",{style:"width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#d4a843,#8b6914);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#000;font-family:monospace;flex-shrink:0;margin-top:20px;"});
    av.textContent="A";
    wrap.append(av,col);
    msgs.appendChild(wrap);
    msgs.scrollTop=msgs.scrollHeight;
    if(onDone)onDone();
  },900);
}

function addUserMsg(text){
  const msgs=document.getElementById("msgs");
  if(!msgs)return;
  const wrap=el("div",{style:"display:flex;flex-direction:row-reverse;margin-bottom:16px;animation:slideUp .3s ease-out;"});
  const bubble=el("div",{style:"background:linear-gradient(135deg,#d4a843,#b8902e);color:#000;border-radius:16px 4px 16px 16px;padding:12px 16px;font-size:14px;line-height:1.6;max-width:75vw;font-weight:500;"});
  bubble.textContent=text;
  wrap.appendChild(bubble);
  msgs.appendChild(wrap);
  msgs.scrollTop=msgs.scrollHeight;
}

function renderChoices(choices){
  const wrap=document.getElementById("choices");
  if(!wrap)return;
  wrap.innerHTML="";
  const grid=el("div",{style:"display:flex;flex-direction:column;gap:8px;"});
  choices.forEach(c=>{
    const btn=el("button",{
      style:"width:100%;padding:12px 16px;background:rgba(255,255,255,.04);border:1px solid rgba(212,168,67,.2);border-radius:10px;color:rgba(255,255,255,.85);font-size:14px;text-align:left;cursor:pointer;transition:all .15s;font-family:sans-serif;line-height:1.4;",
      className:"choice-btn",
      onclick:()=>{
        wrap.innerHTML="";
        addUserMsg(c.label);
        showNode(c.next,300);
      }
    },c.label);
    grid.appendChild(btn);
  });
  wrap.appendChild(grid);
}

/* ── BOOT ──────────────────────────────────────────────────────────────── */
renderLanding();
</script>
</body>
